# ~/.tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# APPEARANCE
# ============================================

# Status bar position
set -g status-position top
set -g status-interval 3

# Status bar colors
set -g status-style 'bg=#13161d fg=#8b949e'
set -g status-left-length 20
set -g status-right-length 140

# Status bar content
set -g status-left '#[fg=#00e68a,bold] #S #[fg=#30363d]│ '
set -g status-right '#(/home/codyh/.tmux/scripts/gpu_status.sh)#[fg=#30363d]│#[fg=#8b949e] CPU #{cpu_percentage} #[fg=#30363d]•#[fg=#8b949e] RAM #{ram_percentage} #[fg=#30363d]•#{cpu_temp_fg_color} TEMP #{cpu_temp} #[fg=#30363d]│#(/home/codyh/.tmux/scripts/git_status_cached.sh "#{pane_current_path}")#[fg=#30363d]│#[fg=#8b949e] %H:%M #[fg=#30363d]│#[fg=#8b949e] %d-%b-%y '

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#00e68a,bold] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'fg=#00e68a'

# Message styling
set -g message-style 'bg=#00e68a fg=#000000 bold'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # macOS
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"  # Linux

# ============================================
# STATUS SEGMENTS
# ============================================

# Keep plugin-provided metrics monochrome by default and only tint hotter values.
set -g @cpu_low_bg_color ''
set -g @cpu_medium_bg_color ''
set -g @cpu_high_bg_color ''
set -g @ram_low_bg_color ''
set -g @ram_medium_bg_color ''
set -g @ram_high_bg_color ''
set -g @cpu_temp_low_bg_color ''
set -g @cpu_temp_medium_bg_color ''
set -g @cpu_temp_high_bg_color ''

set -g @cpu_low_fg_color '#[fg=#8b949e]'
set -g @cpu_medium_fg_color '#[fg=#d29922]'
set -g @cpu_high_fg_color '#[fg=#f85149]'
set -g @ram_low_fg_color '#[fg=#8b949e]'
set -g @ram_medium_fg_color '#[fg=#d29922]'
set -g @ram_high_fg_color '#[fg=#f85149]'
set -g @cpu_temp_low_fg_color '#[fg=#8b949e]'
set -g @cpu_temp_medium_fg_color '#[fg=#d29922]'
set -g @cpu_temp_high_fg_color '#[fg=#f85149]'

set -g @cpu_percentage_format '%2.0f%%'
set -g @ram_percentage_format '%2.0f%%'
set -g @cpu_temp_format '%2.0f'
set -g @cpu_temp_unit 'C'
set -g @cpu_temp_medium_thresh '65'
set -g @cpu_temp_high_thresh '80'

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-cpu'
#set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
#set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
